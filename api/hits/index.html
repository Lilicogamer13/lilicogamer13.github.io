<!DOCTYPE html>
<html lang="en">
    <style>
        custom1 {
            text-align: center;
        }
        custom2 {
            font: 24px Arial, sans-serif;
        }
    </style>
    <script>
        // Fetch the hits count from the API and update the page
        async function updateHits() {
            try {
                const debugjoins = await fetch('https://raw.githubusercontent.com/Lilicogamer13/lilicogamer13.github.io/refs/heads/main/debugjoins.txt');
                const debugjoinsData = await debugjoins.text();
                const response = await fetch('https://proxy.corsfix.com/?url='+'https://hits.sh/api/urns/lilicogamer13.github.io');
                const data = await response.json();
                document.getElementById('hits').textContent = `joins: ${data.total-parseInt(debugjoinsData)}`;
            } catch (error) {
                console.error('Error fetching hits:', error);
            }
        }

        // Update hits count when the page loads
        window.onload = updateHits;
    </script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>joins</title>
</head>
<body>
    <custom1><custom2><h3 id="hits">joins: 0</h3></custom2></custom1>
</body>
</html>
